spring.application.name=backend

# Local dev fallbacks — on Render, set SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD
# which Spring Boot maps at higher priority without needing ${} placeholders
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edushield_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Log resolved datasource URL at startup to confirm env vars are being picked up
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.boot.autoconfigure.jdbc=DEBUG

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=edushield-super-secret-key-change-this-later-make-it-long-enough-for-hs256
jwt.expiration=86400000

server.port=8081